# ==============================================================================
# Pipeline Name: scheduled-boundary-audit.yml
# Description: Scheduled cron execution tracking framework running automated 
#              perimeter audits with dynamic Azure Key Vault secrets mapping.
# ==============================================================================

name: Scheduled_Boundary_Audit_$(Date:yyyyMMdd)$(Rev:.r)

trigger: none
pr: none

schedules:
  - cron: "0 */4 * * *"
    displayName: "Four-Hour Continuous Perimeter Governance Loop"
    branches:
      include:
        - main
    always: true

pool:
  vmImage: 'ubuntu-latest'

variables:
  - name: python_version
    value: '3.11'
  - name: ansible_version
    value: '2.15'
  # The Variable Group acts as the metadata layer linking the pipeline to the Vault
  - group: 'inst-prod-network-secrets-vg' 

stages:
  - stage: PerimeterAudit
    displayName: 'External Ingress Boundary Audits'
    jobs:
      - job: RunBoundaryPlaybook
        displayName: 'Execute Verification Manuals'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(python_version)'
            displayName: 'Bind Python Runtime Layer'

          - script: |
              python -m pip install --upgrade pip
              pip install ansible
            displayName: 'Provision Operational Prerequisites'

          - script: |
              ansible-playbook playbooks/verify_external_boundaries.yml
            displayName: 'Run External Boundary Ingress Audit Playbook'

  - stage: TunnelTransitAudit
    displayName: 'Hybrid Cross-Premises Transit Checks'
    dependsOn: PerimeterAudit
    condition: always()
    jobs:
      - job: ValidateVPNLinks
        displayName: 'Test S2S IPsec Infrastructure'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(python_version)'

          # AKV Access Configuration Block: Authenticates via Azure Service Connection
          # Downloads the required network variables directly into encrypted runner memory
          - task: AzureKeyVault@2
            inputs:
              azureSubscription: 'inst-azure-ops-service-connection'
              KeyVaultName: 'kv-prd-cae-ops-01'
              SecretsFilter: 'SECURE-REMOTE-GATEWAY-IP'
              RunAsPreJob: true
            displayName: 'Execute Secure Key Vault Access Block Handoff'

          # Execute the standalone cross-premises tunnel tracking scripts
          # Note: Azure DevOps auto-maps 'SECURE-REMOTE-GATEWAY-IP' secret to a local environment variable
          - script: |
              python scripts/verify_vpn_tunnel.py
            displayName: 'Run S2S VPN Path Connectivity Verification'
            env:
              VPN_TARGET_GATEWAY_IP: $(SECURE-REMOTE-GATEWAY-IP)
